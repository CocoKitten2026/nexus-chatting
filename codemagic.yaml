workflows:
  ios-workflow:
    name: Nexus iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Node
        script: |
          brew install node
      - name: Install Bun
        script: |
          curl -fsSL https://bun.sh/install | bash
          export BUN_INSTALL="$HOME/.bun"
          export PATH="$BUN_INSTALL/bin:$PATH"
      - name: Install dependencies
        script: |
          export BUN_INSTALL="$HOME/.bun"
          export PATH="$BUN_INSTALL/bin:$PATH"
          bun add @capacitor/core @capacitor/ios @capacitor/cli
      - name: Create www folder
        script: |
          mkdir -p www
          cp index.html www/index.html
      - name: Capacitor init and add iOS
        script: |
          export BUN_INSTALL="$HOME/.bun"
          export PATH="$BUN_INSTALL/bin:$PATH"
          bunx cap init "Nexus" "com.antoniodev.nexus" --web-dir "www" || true
          bunx cap add ios || true
          bunx cap sync ios
      - name: Build iOS
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/Build/Products/Debug-iphonesimulator/App.app
